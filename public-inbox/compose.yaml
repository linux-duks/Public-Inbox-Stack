  #   restart: unless-stopped
  public-inbox:
    build:
      context: .
      dockerfile: ./Containerfile
      args:
        USER_ID: '${UID:-1000}'
        GROUP_ID: '${UID:-1000}'

    user: "${UID}:${GID}"
    # userns_mode: "keep-id"
    # userns_mode: "keep-id:uid=1000,gid=1000"
    environment:
      - DEBUG=false
      - PI_CONFIG=/etc/public-inbox/config
      - PI_DATA_DIR=/data
      - IMAP_FOLDER=INBOX
      - IMAP_SSL=true
      - IMAP_INTERVAL=3600
      - SA_MAX_MAIL_SIZE 4096000
      # in the .env secrets
      # - IMAP_HOST=imap.example.com
      # - IMAP_USER=publicinbox@example.com
      # - IMAP_PASS=secret
    # env_file:
    #   - ./imap.env
      
    volumes:
      - ../data/:/data/:z
      - ../216dark,css/:/static/theme.css:z
      - ./scripts:/app:z
      - ./pi-configs/:/etc/public-inbox/:z
      # - ./public-inbox/config:/etc/public-inbox-source/:z
      - ./logs/:/var/log/public-inbox/:z
    # network_mode: "host"
    ports:
      - "8080:8080"  # HTTP access
      # - "119:119"     # NNTP access
      # - "143:143"     # IMAP access
      

    # Make sure public-inbox is running in the foreground
    command: >
      bash ./start.sh

version: '3'

# Usage:
#   docker compose up -d                          # clone mode (default)
#   GROKMIRROR_MODE=indexed docker compose up -d  # indexed mode (with public-inbox hooks)

services:
  grokmirror:
    build:
      # uses the parent as context to install both grokmirror and public-inbox from source
      context: ..
      dockerfile: ./grokmirror/Containerfile

    environment:
      - HOME=/tmp
      - GROKMIRROR_MODE=${GROKMIRROR_MODE:-clone}

    # stdin_open: true
    user: "${UID}:${GID}"
    volumes:
    - ./lore-${GROKMIRROR_MODE:-clone}.conf:/config/lore.conf:z
    - ../public-inbox/pi-configs/:/etc/public-inbox/:z
    - ../data/:/data:z
    command: grok-pull -v -c /config/lore.conf

